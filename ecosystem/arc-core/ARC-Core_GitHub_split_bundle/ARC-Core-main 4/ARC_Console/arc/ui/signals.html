<!doctype html><html><head><meta charset="utf-8"/><title>ARC Signals</title>
<style>
body{font-family:Inter,system-ui,Arial,sans-serif;background:#0a0a12;color:#ececff;margin:0}
a{color:#c9b3ff;text-decoration:none}
.top{display:flex;gap:18px;align-items:center;padding:18px 22px;background:linear-gradient(90deg,#17142a,#22183d);position:sticky;top:0}
.brand{font-weight:800;letter-spacing:.08em}
.wrap{padding:18px 22px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.card{background:#131321;border:1px solid #2b2750;border-radius:18px;padding:16px;box-shadow:0 12px 28px rgba(0,0,0,.25)}
h1,h2,h3{margin:.1em 0 .5em}
.small{font-size:12px;opacity:.8}
pre{white-space:pre-wrap;word-break:break-word;background:#0d0d18;padding:12px;border-radius:12px;border:1px solid #242444}
.table{width:100%;border-collapse:collapse}
.table td,.table th{border-bottom:1px solid #26263d;padding:8px 10px;text-align:left;font-size:14px}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#22193e;border:1px solid #4f3d84;font-size:12px}
button{background:#7b4dff;color:white;border:none;border-radius:12px;padding:10px 14px;cursor:pointer}
input,select,textarea{width:100%;box-sizing:border-box;background:#0f1020;color:#f5f5ff;border:1px solid #33375e;border-radius:10px;padding:10px}
label{font-size:13px;display:block;margin:8px 0}
</style>
</head>
<body>
<div class="top">
  <div class="brand">ARC // CORE</div>
  <a href="/ui/dashboard.html">Dashboard</a>
  <a href="/ui/signals.html">Signals</a>
  <a href="/ui/graph.html">Graph</a>
  <a href="/ui/timeline.html">Timeline</a>
  <a href="/ui/cases.html">Cases</a>
  <a href="/ui/geo.html">Geo</a>
</div>

<div class="wrap">
  <h1>Signal Intake</h1>
  <div class="grid">
    <div class="card">
      <h3>Create Event</h3>
      <label>Subject<input id="subject" value="Alec Sadler"></label>
      <label>Object<input id="object" value="Node Device 44"></label>
      <label>Type<input id="event_type" value="contact"></label>
      <label>Source<input id="source" value="operator_console"></label>
      <label>Location<input id="location" value="Downtown Tower"></label>
      <label>Confidence<input id="confidence" value="0.81"></label>
      <label>Severity<input id="severity" value="6"></label>
      <button onclick="submitEvent()">Ingest</button>
      <pre id="out"></pre>
    </div>
    <div class="card">
      <h3>Recent Events</h3>
      <div id="events"></div>
    </div>
  </div>
</div>
<script>
async function refresh(){
 const res = await fetch('/api/events?limit=20').then(r=>r.json());
 document.getElementById('events').innerHTML = res.events.map(e=>`<div class="small"><span class="badge">${e.event_type}</span> ${e.ts}<br>${e.subject} → ${e.object || '-'}<br>sev=${e.severity} conf=${e.confidence}</div><hr style="border-color:#26263d">`).join('');
}
async function submitEvent(){
 const payload = {
  subject:subject.value, object:object.value, event_type:event_type.value, source:source.value, location:location.value,
  confidence:parseFloat(confidence.value), severity:parseInt(severity.value,10), payload:{note:'manual ui entry'}
 };
 const res = await fetch('/api/events', {method:'POST', headers:{'Content-Type':'application/json','X-ARC-Role':'observer'}, body:JSON.stringify(payload)}).then(r=>r.json());
 out.textContent = JSON.stringify(res,null,2);
 refresh();
}
refresh();
</script>
</body></html>
