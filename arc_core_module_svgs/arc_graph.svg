<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ARC Graph</title>
  <desc id="desc">Original ARC Core module glyph for ARC Graph.</desc>
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F2F2F2" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#F2F2F2" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#F2F2F2" stop-opacity="0"/>
    </radialGradient>
    <style>
      .arc-stroke {
        stroke: #F2F2F2;
        stroke-width: 34;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#glow);
      }
      .arc-thin {
        stroke: #F2F2F2;
        stroke-width: 18;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#glow);
      }
      .arc-dot {
        fill: #F2F2F2;
        filter: url(#glow);
      }
      .arc-fill {
        fill: #F2F2F2;
        filter: url(#glow);
      }
      .arc-faint {
        stroke: #F2F2F2;
        stroke-width: 10;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.45;
      }
    </style>
  </defs>
  <rect width="1024" height="1024" rx="128" fill="#05070A"/>
  <circle cx="512" cy="512" r="390" fill="url(#halo)"/>
  <g transform="translate(0 0)">

