    <path class="arc-stroke" d="M746 512H810"/>
    <path class="arc-thin" d="M608 416L512 512L548 654"/>
    <path class="arc-thin" d="M416 608L512 512"/>
    <circle class="arc-dot" cx="512" cy="512" r="24"/>
    <path class="arc-faint" d="M338 338A246 246 0 0 1 686 338"/>
    <path class="arc-faint" d="M686 686A246 246 0 0 1 338 686"/>
