name: ARC Cognition Core CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check package artifacts are gone
        run: |
          if git ls-files | grep -E '(\.patch$|^APPLY_|cleanup_dropin_artifacts)'; then
            echo "ERROR: package/drop-in artifacts are still tracked."
            exit 1
          fi
          echo "Package artifact check passed."

      - name: Check private key safety
        run: |
          if git ls-files | grep -E '(^|/)receipt_signing\.key$'; then
            echo "ERROR: receipt_signing.key is tracked."
            exit 1
          fi
          echo "Private key check passed."

      - name: Check branch protection support files exist
        run: |
          test -f .github/branch-protection-main.json
          test -f scripts/github/apply_main_branch_protection.sh
          test -f scripts/github/check_main_branch_protection.sh
          echo "Branch protection support files exist."

      - name: Check core docs exist
        run: |
          test -f README.md
          test -f ROADMAP.md
          test -f SUPPORT.md
          test -f CONTRIBUTING.md
          echo "Core docs exist."
