name: ARC Cognition Core CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check package artifacts are gone
        run: |
          BAD="$(git ls-files | grep -E '(\.patch$|^APPLY_|cleanup_dropin_artifacts)' || true)"
          if [ -n "$BAD" ]; then
            echo "$BAD"
            echo "ERROR: package/drop-in artifacts are still tracked."
            exit 1
          fi
          echo "Package artifact check passed."

      - name: Check private key safety
        run: |
          BAD="$(git ls-files | grep -E '(^|/)receipt_signing\.key$' || true)"
          if [ -n "$BAD" ]; then
            echo "$BAD"
            echo "ERROR: receipt_signing.key is tracked."
            exit 1
          fi
          echo "Private key check passed."

      - name: Check README exists
        run: |
          test -f README.md
          echo "README exists."

      - name: Print branch helper status
        run: |
          for f in .github/branch-protection-main.json scripts/github/apply_main_branch_protection.sh scripts          for fain_branch_protection.sh; do
            if [ -f "$f" ]; then
              echo "FOUND: $f"
            else
              echo "OPTIONAL MISSING: $f"
            fi
          done
