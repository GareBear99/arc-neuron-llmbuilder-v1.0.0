name: ARC Cognition Core CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate repo structure
        run: python3 scripts/validate_repo.py

      - name: Run test suite (excluding slow training tests)
        run: |
          python3 -m pytest tests/ -q \
            --ignore=tests/test_arc_core_fixes.py \
            -k "not arc_native_training and not arc_native_small and not lora_arc_native_routing" \
            --tb=short
        env:
          PYTHONPATH: .

      - name: Run core fix tests (fast subset)
        run: |
          python3 -m pytest tests/test_arc_core_fixes.py -q \
            -k "shared_base or rubric or gguf_roundtrip or scaffold_for_unknown" \
            --tb=short
        env:
          PYTHONPATH: .

      - name: Check key files are not committed
        run: |
          if git ls-files | grep -q "receipt_signing.key"; then
            echo "ERROR: receipt_signing.key is tracked by git"
            exit 1
          fi
          echo "Key files check passed"

      - name: Dataset counts
        run: python3 scripts/build_dataset.py
        env:
          PYTHONPATH: .

      - name: Benchmark counts
        run: python3 scripts/run_benchmarks.py
        env:
          PYTHONPATH: .
