name: ARC Cognition Core CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm repository checkout
        run: |
          echo "Repository checked out successfully."
          echo "CI workflow is stable."

      - name: Confirm no obvious drop-in artifacts
        run: |
          python3 - <<'PY'
          from pathlib import Path

          bad = []
          for p in Path(".").glob("*"):
              name = p.name
              if name.endswith(".patch") or name.startswith("APPLY_"):
                  bad.append(name)

          if bad:
              print("ERROR: root package artifacts found:")
              for item in bad:
                  print(item)
              raise SystemExit(1)

          print("No root drop-in artifacts found.")
          PY
