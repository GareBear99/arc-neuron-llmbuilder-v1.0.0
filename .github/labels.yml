  color: 0052cc
  description: Expanded native lane milestone.

- name: v1.2.0
  color: 0052cc
  description: External backend integration milestone.

- name: v1.3.0
  color: 0052cc
  description: Multi-repo integration milestone.

- name: v2.0.0
  color: 0052cc
  description: Production governance milestone.
