<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img">
  <title>ARC-Neuron LLMBuilder v1.0.0 social preview</title>
  <desc>Protected local-first LLM lifecycle baseline with benchmark receipts, candidate promotion, lineage and governance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050814"/>
      <stop offset="45%" stop-color="#071426"/>
      <stop offset="100%" stop-color="#02030a"/>
    </linearGradient>
    <radialGradient id="glowA" cx="72%" cy="42%" r="44%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.52"/>
      <stop offset="38%" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#02030a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="12%" cy="12%" r="52%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#02030a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="whiteBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow" x="-10%" y="-40%" width="120%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.16"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.55"/>
  <rect width="1280" height="640" fill="url(#glowA)"/>
  <rect width="1280" height="640" fill="url(#glowB)"/>

  <g stroke="#0ea5e9" stroke-width="2" fill="none" opacity="0.28">
