  <rect y="604" width="1280" height="36" fill="#020617" opacity="0.72"/>
  <text x="66" y="628" fill="#93c5fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">GareBear99/arc-neuron-llmbuilder-v1.0.0</text>
  <text x="1030" y="628" fill="#5eead4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Python • MIT • Local-first</text>
