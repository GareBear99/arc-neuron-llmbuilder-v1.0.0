    <text x="354" y="274" fill="#38bdf8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="4">v1.0.0</text>
    <line x1="470" y1="262" x2="684" y2="262" stroke="#0ea5e9" stroke-width="3" opacity="0.8"/>
